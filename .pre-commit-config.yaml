repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude_types: [markdown]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-case-conflict

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: [-i, "2", -ci, -sr, -w]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/ansible/ansible-lint
    rev: v26.6.0
    hooks:
      - id: ansible-lint
        files: ^ansible/.*\.(yml|yaml)$
        # pass_filenames: false + a fixed `ansible/` target (rather than
        # letting pre-commit pass just the staged files) so a local run
        # lints the same scope CI does. ansible-lint resolves roles/module
        # collections project-wide, not per-file — a diff-scoped run can
        # miss a role broken by files outside the diff (see #32, where CI's
        # whole-repo lint caught something a files-only local run never
        # would have looked at).
        pass_filenames: false
        # ansible.cfg lives in ansible/, but pre-commit (like the CI action)
        # runs hooks from the repo root, where ansible-core's ansible.cfg
        # discovery (cwd only) never finds it — silently breaking
        # roles_path and any role-using playbook. Override the upstream
        # entry to inject the same env var .github/workflows/ci.yml sets.
        entry: env ANSIBLE_CONFIG=ansible/ansible.cfg python3 -m ansiblelint -v --force-color ansible/

  - repo: local
    hooks:
      - id: tofu-fmt
        name: tofu fmt
        entry: tofu fmt
        language: system
        files: \.tf(vars)?$
