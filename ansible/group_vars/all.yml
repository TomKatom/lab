---
# Shared, non-secret Ansible vars for every host. Secrets live in
# all.sops.yml (SOPS + age, decrypted in-memory by the community.sops vars
# plugin enabled in ../ansible.cfg — never written to disk).
#
# Facts shared with OpenTofu/Helm live in ../../config/lab.yml instead of
# here, and are loaded per-playbook via `vars_files` (see docs/architecture.md
# #configuration-single-source-of-truth). This file only holds vars that are
# Ansible-only or, like ovh_public_ip below, needed before a playbook's
# vars_files load (see inventory/hosts.yml's top comment for why).

# Must match infra/tofu/terraform.tfvars `ovh_public_ip` — kept in sync by
# hand, same as that file's own duplication of the value inside
# `proxmox_endpoint`.
ovh_public_ip: 145.239.3.55

# Shared between roles/wireguard and playbooks/verify-wireguard.yml — a
# single name so neither has to redeclare it.
wireguard_interface: wg0

# Operator WireGuard peers: public keys and AllowedIPs only, never private
# key material (each peer generates and holds its own private key — see
# docs/ssh-keys.md's custody model for the same principle applied to SSH).
# Empty until an operator peer exists; roles/wireguard renders an interface
# with zero peers rather than failing when this list is empty.
#
# Add a peer once you've generated a keypair locally (`wg genkey | tee
# privatekey | wg pubkey > publickey` — keep privatekey off this repo
# entirely, it never needs to leave your machine):
#   wireguard_peers:
#     - name: my-laptop
#       public_key: "<contents of publickey>"
#       allowed_ips:
#         - "{{ network.wireguard_subnet }}"
#         - "{{ network.internal_subnet }}"
wireguard_peers:
  - name: toms-macbook
    public_key: "nLi+BSIB6VIf99D1cLlIsbqZ3AU8jp+z2rp/n0LB/TQ="
    allowed_ips:
      - "{{ network.wireguard_subnet }}"
      - "{{ network.internal_subnet }}"
