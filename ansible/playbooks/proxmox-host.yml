---
# Layer 2, host-side configuration. Roles land here incrementally as their
# PRs merge — pve_repos (this host has no paid PVE subscription, so its
# enterprise apt repos are swapped for the free no-subscription one) must
# run first, before any other role's apt tasks; pve_firewall (flip to the
# nftables firewall backend) must precede network_nat, whose egress
# masquerade only works once the legacy iptables backend stops forcing
# net.bridge.bridge-nf-call-iptables=1 (see roles/pve_firewall); wireguard
# and network_nat next; hardening runs after that (its sysctl/ip_forward
# assert depends on wireguard having already run); zfs_tank has no ordering
# dependency on the others — it only needs apt, so it could run earlier, but
# lands here to keep this list append-only as roles land; pve_permissions
# likewise has no ordering dependency on zfs_tank or anything else in this
# list — its only real precondition is that qemu-guest-agent is already
# running in the guest VMs, which happens via a separate playbook
# (hardening-vms.yml) targeting vm_guests, not anything in this host
# playbook's role list — so it's appended last purely to keep the list
# append-only, not because of an ordering dependency on zfs_tank
# specifically.
#
# Bootstrap ordering: this brings up WireGuard over the host's still-public
# SSH. Do NOT flip infra/tofu's restrict_management to true until
# playbooks/verify-wireguard.yml passes end-to-end — see
# docs/architecture.md#management-plane.
- name: Configure the Proxmox host
  hosts: proxmox_host
  become: false  # already connecting as root, no sudo needed
  vars_files:
    - ../../config/lab.yml
  pre_tasks:
    - name: Resolve nat_ingress_rules port/destination names to concrete values
      # config/lab.yml's nat_ingress_rules references ports/destinations by
      # name (keys into `ports`/`network`) so the port list only exists in one
      # place; network_nat itself is a generic DNAT-rule renderer and doesn't
      # know about lab.yml's schema, so this is the one place that resolves
      # names to the concrete {proto, port, destination} tuples it expects.
      ansible.builtin.set_fact:
        network_nat_ingress_rules: "{{ (network_nat_ingress_rules | default([])) + [rule | combine({'port': ports[rule.port], 'destination': network[rule.destination]})] }}"
      loop: "{{ nat_ingress_rules }}"
      loop_control:
        loop_var: rule
  roles:
    - pve_repos
    - pve_firewall
    - wireguard
    - network_nat
    - role: hardening
      vars:
        hardening_is_pve_host: true
    - zfs_tank
    - pve_permissions
