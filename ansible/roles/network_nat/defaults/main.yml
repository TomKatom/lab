---
# Role-private vars, prefixed network_nat_* so they can't collide with
# another role's defaults. Unlike wireguard_interface/wireguard_peers,
# nothing here is needed outside this role, so it stays here rather than in
# group_vars/all.yml.

network_nat_table: lab-nat
network_nat_ruleset_dir: /etc/nftables.d
network_nat_ruleset_path: "{{ network_nat_ruleset_dir }}/lab-nat.nft"
network_nat_bridge: vmbr1
network_nat_service_name: lab-nat

# Ingress DNAT rules: a plain list of {comment, proto, port, destination}
# tuples, already resolved to concrete values by the caller (this role
# doesn't know about config/lab.yml's schema — see playbooks/proxmox-host.yml
# for where the port/destination names get resolved). Empty by default: no
# rules means no prerouting/DNAT chain is rendered at all.
network_nat_ingress_rules: []
