---
# This host has no paid Proxmox VE subscription, so its enterprise apt
# repos (enabled by default on every fresh install, for both PVE itself and
# Ceph) return 401 Unauthorized on every apt update — discovered when the
# first-ever live Ansible apply failed on wireguard's very first task. This
# role runs before every other role in playbooks/proxmox-host.yml so their
# apt tasks see a working cache. No Ceph is used on this host, so its
# enterprise repo is removed outright rather than repointed.

- name: Remove the PVE enterprise apt repo
  ansible.builtin.file:
    path: "{{ pve_repos_enterprise_list }}"
    state: absent

- name: Remove the Ceph enterprise apt repo
  ansible.builtin.file:
    path: "{{ pve_repos_ceph_enterprise_list }}"
    state: absent

- name: Point apt at the free PVE no-subscription repo
  # deb822_repository, not the deprecated apt_repository — trixie's own
  # sources already ship in this format.
  ansible.builtin.deb822_repository:
    name: pve-no-subscription
    types: deb
    uris: http://download.proxmox.com/debian/pve
    suites: "{{ ansible_distribution_release }}"
    components: pve-no-subscription
    state: present

- name: Refresh the apt cache now that the repos are fixed
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
