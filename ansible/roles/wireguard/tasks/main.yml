---
# WireGuard management-plane tunnel on the Proxmox host. The host private
# key is generated in place on first run and never leaves it — see the
# "Read the host private key back" task below for why that's safe despite
# needing the value to render wg0.conf.

- name: Assert every peer owns exactly one unique /32
  # Cheap guard for a failure mode WireGuard itself reports nowhere: a
  # prefix belongs to exactly one peer, so two peers claiming overlapping
  # AllowedIPs is not an error — the last one configured silently takes the
  # prefix and the earlier peer stops receiving traffic. A wider-than-/32
  # entry is the same class of mistake (it's the client's route list pasted
  # into the server's anti-spoof filter). See group_vars/all.yml.
  ansible.builtin.assert:
    that:
      - wireguard_peers | map(attribute='address') | select('match', '.*/32$') | list | length == wireguard_peers | length
      - wireguard_peers | map(attribute='address') | unique | length == wireguard_peers | length
    fail_msg: >-
      Every entry in wireguard_peers must declare a unique `address` that is
      a single /32 inside {{ network.wireguard_subnet }} — one host address
      per peer, no subnets, no duplicates. Got:
      {{ wireguard_peers | map(attribute='address') | list }}
    success_msg: Peer addresses are unique /32s.
  run_once: true

- name: Install wireguard-tools
  ansible.builtin.apt:
    name: wireguard-tools
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Enable IPv4 forwarding (WireGuard peers route into vmbr1)
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: true
    state: present
    reload: true

- name: Ensure /etc/wireguard exists with restrictive permissions
  ansible.builtin.file:
    path: "{{ wireguard_key_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Generate the host's WireGuard private key (once, ever — idempotent)
  ansible.builtin.shell: |
    set -euo pipefail
    umask 077
    wg genkey > {{ wireguard_private_key_path }}
  args:
    creates: "{{ wireguard_private_key_path }}"
    executable: /bin/bash

- name: Lock down the private key file permissions
  ansible.builtin.file:
    path: "{{ wireguard_private_key_path }}"
    owner: root
    group: root
    mode: "0600"

- name: Read the host private key back
  # This value only ever exists in this run's in-memory facts on the
  # controller — never written to the controller's disk, never committed.
  # It's needed here purely to render wg0.conf below (wg-quick's config
  # format takes PrivateKey as a literal, not a file reference).
  ansible.builtin.slurp:
    src: "{{ wireguard_private_key_path }}"
  register: wireguard_private_key_slurp
  no_log: true

- name: Derive the host's public key
  ansible.builtin.command: wg pubkey
  args:
    stdin: "{{ wireguard_private_key_slurp.content | b64decode }}"
  register: wireguard_pubkey_result
  changed_when: false
  no_log: true

- name: Show the host's WireGuard public key
  ansible.builtin.debug:
    msg: >-
      Host WireGuard public key: {{ wireguard_pubkey_result.stdout }}
      — give this to peers configuring their own client tunnel.

- name: Render wg0.conf
  # The rendered file embeds the private key (and any peer PresharedKey) —
  # no_log so --diff can't leak either.
  #
  # The template sets `Table = off`. What originally forced that: peers used
  # to carry the *client's* route list (wireguard_subnet + internal_subnet)
  # as their server-side AllowedIPs, and wg-quick's default automatic routing
  # (Table = auto) turns every AllowedIPs entry into an `ip route add ... dev
  # wg0` — including one for internal_subnet, already directly connected via
  # vmbr1, which fails with RTNETLINK "File exists" and takes the whole
  # wg-quick@wg0 unit down with it. Peers are now scoped to their own /32
  # (group_vars/all.yml), so that collision is gone and Table = auto would
  # work — but this stays off deliberately: nothing needs it (the
  # wireguard_subnet route comes free from the interface's own Address, and
  # every peer /32 falls inside it), and on a box with no console, fewer
  # route mutations per restart is the safer default. Table = off only
  # disables wg-quick's own `ip route add` side effects; WireGuard's
  # AllowedIPs-based crypto-routing and anti-spoof source filtering are set
  # unconditionally via `wg set` either way.
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: "{{ wireguard_key_dir }}/{{ wireguard_interface }}.conf"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart wireguard

- name: Enable and start wg-quick
  ansible.builtin.systemd:
    name: "wg-quick@{{ wireguard_interface }}"
    enabled: true
    state: started
