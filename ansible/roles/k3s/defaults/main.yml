---
# Role-private vars, prefixed k3s_* so they can't collide with another role's
# defaults.

# renovate: datasource=github-releases depName=k3s-io/k3s
k3s_version: "v1.36.2+k3s1"

# scsi1 data disk (see infra/tofu/vm-k3s.tf) — presents as /dev/sdb in the
# guest (scsi0, the OS disk, is /dev/sda). Never formatted before this role
# runs.
k3s_data_disk_device: /dev/sdb
k3s_data_disk_expected_size_gb: 150
k3s_data_disk_min_size_gb: 140
k3s_data_disk_fstype: ext4
k3s_storage_mount_path: /var/lib/rancher/k3s/storage
k3s_data_disk_mount_opts: defaults

k3s_config_dir: /etc/rancher/k3s
k3s_disable_components:
  - traefik

k3s_apiserver_ip: 10.10.10.10
k3s_kubeconfig_remote_path: /etc/rancher/k3s/k3s.yaml
k3s_kubeconfig_local_path: "{{ playbook_dir }}/../../kubeconfig"
