---
- name: Read the remote kubeconfig
  ansible.builtin.slurp:
    src: "{{ k3s_kubeconfig_remote_path }}"
  register: k3s_kubeconfig_remote

- name: Write a local kubeconfig pointed at the VM's real IP
  # The remote kubeconfig points at https://127.0.0.1:6443, which only
  # resolves correctly on the VM itself — rewritten here to the VM's actual
  # address so it works from wherever this playbook is run.
  ansible.builtin.copy:
    content: >-
      {{ (k3s_kubeconfig_remote.content | b64decode)
      | replace('https://127.0.0.1:6443', 'https://' + k3s_apiserver_ip + ':6443') }}
    dest: "{{ k3s_kubeconfig_local_path }}"
    mode: "0600"
  delegate_to: localhost
  become: false
  run_once: true
