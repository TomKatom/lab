---
# Safety-critical: this formats a raw disk. The assert below is the real
# guard — it must never be skipped or downgraded to advisory, since a
# mistaken device here would mkfs over either the OS disk or a disk holding
# data that matters.

- name: Stat the k3s data disk device
  ansible.builtin.stat:
    path: "{{ k3s_data_disk_device }}"
  register: k3s_data_disk_stat

- name: Determine the device backing the root filesystem
  ansible.builtin.set_fact:
    k3s_root_disk: >-
      {{ (ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='device') | first)
      | regex_replace('[0-9]+$', '') }}

- name: Compute the k3s data disk's reported size in GB
  # ansible_devices is keyed by bare device name (sdb, not /dev/sdb) and
  # gives exact sectors/sectorsize — computing from those avoids parsing the
  # human-formatted 'size' string (e.g. "150.00 GB").
  ansible.builtin.set_fact:
    k3s_data_disk_facts: >-
      {{ ansible_devices[k3s_data_disk_device | regex_replace('^/dev/', '')] | default({}) }}

- name: Assert the k3s data disk is present, correctly sized, and not the root disk
  # This is the guard that keeps this role from ever touching the wrong
  # disk: refuses to proceed unless /dev/sdb exists, reports at least
  # k3s_data_disk_min_size_gb, and is provably a different device than the
  # one backing the root filesystem.
  ansible.builtin.assert:
    that:
      - k3s_data_disk_stat.stat.exists
      - k3s_data_disk_facts | length > 0
      - ((k3s_data_disk_facts.sectors | int) * (k3s_data_disk_facts.sectorsize | int) / (1000 * 1000 * 1000)) | int >= k3s_data_disk_min_size_gb
      - k3s_data_disk_device != k3s_root_disk
    fail_msg: >-
      Refusing to touch {{ k3s_data_disk_device }}: either it doesn't exist,
      it's smaller than the expected scsi1 data disk
      ({{ k3s_data_disk_min_size_gb }} GB minimum), or it is the device
      backing the root filesystem ({{ k3s_root_disk }}). This guard exists so
      this role can never mkfs over the OS disk or a wrongly-identified
      device.
    success_msg: >-
      {{ k3s_data_disk_device }} exists, is not the root disk
      ({{ k3s_root_disk }}), and meets the {{ k3s_data_disk_min_size_gb }} GB
      minimum size.

- name: Ensure the k3s storage parent directory exists
  ansible.builtin.file:
    path: /var/lib/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create the filesystem on the k3s data disk
  # community.general.filesystem is idempotent by design: it only runs mkfs
  # when no filesystem is detected on the device, so re-running this role is
  # safe without any extra existence check here. force is always false —
  # never overwrite an existing filesystem signature.
  community.general.filesystem:
    fstype: "{{ k3s_data_disk_fstype }}"
    dev: "{{ k3s_data_disk_device }}"
    force: false

- name: Read the k3s data disk's filesystem UUID
  ansible.builtin.command:
    cmd: "blkid -s UUID -o value {{ k3s_data_disk_device }}"
  register: k3s_data_disk_uuid
  changed_when: false

- name: Mount the k3s data disk at the storage path
  ansible.posix.mount:
    path: "{{ k3s_storage_mount_path }}"
    src: "UUID={{ k3s_data_disk_uuid.stdout }}"
    fstype: "{{ k3s_data_disk_fstype }}"
    opts: "{{ k3s_data_disk_mount_opts }}"
    state: mounted

- name: Read back the mount source at the storage path
  ansible.builtin.command:
    cmd: "findmnt -no SOURCE {{ k3s_storage_mount_path }}"
  register: k3s_storage_mount_check
  changed_when: false

- name: Assert the storage path is genuinely mounted
  ansible.builtin.assert:
    that:
      - k3s_storage_mount_check.stdout | trim | length > 0
    fail_msg: >-
      {{ k3s_storage_mount_path }} does not report a mount source from
      findmnt — the mount did not take effect.
    success_msg: >-
      {{ k3s_storage_mount_path }} is mounted from
      {{ k3s_storage_mount_check.stdout }}.
