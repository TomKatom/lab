---
- name: Install unattended-upgrades
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - apt-listchanges
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: hardening_unattended_upgrades_enabled

- name: Enable periodic apt update/upgrade
  ansible.builtin.template:
    src: 20auto-upgrades.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
  when: hardening_unattended_upgrades_enabled

- name: Configure unattended-upgrades hardening overrides
  # No handler — apt.conf.d is read fresh on apt's next invocation, there's
  # no daemon to reload.
  ansible.builtin.template:
    src: 52hardening-unattended.j2
    dest: /etc/apt/apt.conf.d/52hardening-unattended
    owner: root
    group: root
    mode: "0644"
  when: hardening_unattended_upgrades_enabled
