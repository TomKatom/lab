; Ansible config for the Configure layer. Committed so behavior is identical
; for every operator/runner — nothing here should live only in a local
; ~/.ansible.cfg.
[defaults]
inventory      = inventory/hosts.yml
roles_path     = roles
retry_files_enabled = False
interpreter_python  = auto_silent
; Any group_vars/host_vars *.sops.yml file (none exist yet — see
; ansible/README.md) is decrypted in-memory at load time by the
; community.sops vars plugin below — never written to disk. host_group_vars
; is the built-in plugin that loads plain group_vars/host_vars; both must
; stay enabled since community.sops.sops only handles *.sops.yml.
vars_plugins_enabled = host_group_vars, community.sops.sops

[ssh_connection]
; Faster without weakening auth: reuses one SSH connection per host for the
; whole play instead of one per task. Requires `requiretty` off in sudoers,
; which is the default on Debian.
pipelining = True
