; Ansible config for the Configure layer. Committed so behavior is identical
; for every operator/runner — nothing here should live only in a local
; ~/.ansible.cfg.
[defaults]
inventory      = inventory/hosts.yml
roles_path     = roles
retry_files_enabled = False
interpreter_python  = auto_silent
; Any group_vars/host_vars *.sops.yml file (e.g. group_vars/k3s_node.sops.yml
; — see ansible/README.md) is decrypted in-memory at load time by the
; community.sops vars plugin below — never written to disk. host_group_vars
; is the built-in plugin that loads plain group_vars/host_vars; both must
; stay enabled since community.sops.sops only handles *.sops.yml.
vars_plugins_enabled = host_group_vars, community.sops.sops
; Per-task connection timeout (seconds). Matters most for hosts reached via
; the ProxyJump/ProxyCommand bastion hop (inventory/hosts.yml's k3s_node and
; runner groups) — a fresh CI runner's first-ever jump through a heavily
; brute-forced bastion can be momentarily slow to establish.
timeout = 30

[ssh_connection]
; Faster without weakening auth: reuses one SSH connection per host for the
; whole play instead of one per task. Requires `requiretty` off in sudoers,
; which is the default on Debian.
pipelining = True
; Retries a task's SSH connection this many times before failing, in
; addition to the ssh-level ConnectionAttempts set per-host in
; inventory/hosts.yml for the ProxyCommand jump hop. Guards against the same
; transient bastion hiccup at the ansible layer, not just the ssh layer.
retries = 3
