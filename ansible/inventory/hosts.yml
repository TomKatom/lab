---
# Static inventory: the Proxmox host and the k3s-node VM it hosts.
#
# ansible_host values below are intentionally literal, not sourced from
# ../../config/lab.yml: inventory parsing happens before any playbook's
# `vars_files` loads that file, so its facts aren't available yet at this
# point. Keep these in sync by hand with their source of truth:
#   - server.ansible_host   <-> infra/tofu/terraform.tfvars `ovh_public_ip`
#   - k3s-node.ansible_host <-> config/lab.yml `network.vm_ip_address`
all:
  vars:
    # Fresh infra, empty known_hosts: accept-new trusts a host the first
    # time it's seen but still fails on a *changed* key afterwards (e.g. the
    # VM being rebuilt) — not the same as disabling host-key checking.
    ansible_ssh_common_args: -o StrictHostKeyChecking=accept-new
  children:
    proxmox_host:
      hosts:
        server:
          ansible_host: 145.239.3.55
          ansible_user: root

    k3s_node:
      hosts:
        k3s-node:
          ansible_host: 10.10.10.10
          ansible_user: debian
          # k3s-node sits on the internal bridge (vmbr1) — reachable only
          # through the Proxmox host. ProxyJump works before WireGuard (over
          # the host's still-public SSH) and after (the operator's WG source
          # IP falls inside the `mgmt` ipset that still accepts host SSH),
          # so this never needs to change across the Phase 3 bootstrap.
          ansible_ssh_common_args: >-
            -o ProxyJump=root@{{ hostvars['server'].ansible_host }}
            -o StrictHostKeyChecking=accept-new
