---
# Static inventory: the Proxmox host and the k3s-node VM it hosts.
#
# ansible_host values below are intentionally literal, not sourced from
# ../../config/lab.yml: inventory parsing happens before any playbook's
# `vars_files` loads that file, so its facts aren't available yet at this
# point. Keep these in sync by hand with their source of truth:
#   - server.ansible_host      <-> infra/tofu/terraform.tfvars `ovh_public_ip`
#   - server-wg.ansible_host   <-> config/lab.yml `network.wireguard_host_address`
#   - k3s-node.ansible_host    <-> config/lab.yml `network.vm_ip_address`
#   - k3s-node-wg.ansible_host <-> config/lab.yml `network.vm_ip_address`
#   - ci-runner.ansible_host   <-> config/lab.yml `network.runner_address`
#   - k3s-node ProxyJump host  <-> config/lab.yml `network.vmbr1_host_address` (10.10.10.1)
all:
  vars:
    # Fresh infra, empty known_hosts: accept-new trusts a host the first
    # time it's seen but still fails on a *changed* key afterwards (e.g. the
    # VM being rebuilt) — not the same as disabling host-key checking.
    ansible_ssh_common_args: -o StrictHostKeyChecking=accept-new
  children:
    proxmox_host:
      hosts:
        server:
          ansible_host: 145.239.3.55
          ansible_user: root

    # Same physical host as `server`, reached over its WireGuard address
    # instead of the public IP — used only by playbooks/verify-wireguard.yml
    # to prove the tunnel path works before Tofu's restrict_management flip
    # drops public SSH. Deliberately its own group, not a member of
    # proxmox_host: config-applying playbooks (proxmox-host.yml) must never
    # double-run against what is, physically, one machine.
    proxmox_host_wg:
      hosts:
        server-wg:
          ansible_host: 10.10.20.1
          ansible_user: root

    k3s_node:
      hosts:
        k3s-node:
          ansible_host: 10.10.10.10
          ansible_user: debian
          # k3s-node sits on the internal bridge (vmbr1) — reachable only
          # through the Proxmox host, so we jump through it. The jump hop
          # targets the host's *internal* vmbr1 address (10.10.10.1, =
          # config/lab.yml network.vmbr1_host_address), NOT its public IP, so
          # both consumers land inside the `mgmt` ipset that host SSH accepts
          # after the restrict_management flip:
          #   - CI (the self-hosted runner, 10.10.10.20 on vmbr1) reaches
          #     10.10.10.1 directly; its source stays in internal_subnet.
          #   - an operator over WireGuard reaches 10.10.10.1 through the
          #     tunnel; its source is their wireguard_subnet peer IP.
          # Jumping via the *public* IP strands the WG operator: their
          # traffic to the public IP leaves the tunnel with a non-mgmt source
          # and the restricted host firewall silently drops it (connection
          # hangs). Safe because k3s-node is only ever reached after the
          # self-hosted runner exists, or by the operator over WG — never
          # from ubuntu-latest, so 10.10.10.1 is always reachable here (unlike
          # the `runner` group below; see its note).
          #
          # Spelled out as an explicit `ssh -W` ProxyCommand rather than the
          # `-o ProxyJump=` shorthand: the shorthand's inner jump connection
          # doesn't reliably inherit the outer ssh's own -o flags (accept-new,
          # keepalives, timeouts) on every OpenSSH build, so on a fresh CI
          # runner a momentarily slow or heavily brute-forced bastion hop can
          # die pre-auth with a bare "Connection closed by UNKNOWN port
          # 65535" and no further diagnostic. Writing the jump hop's options
          # out explicitly makes them actually apply to that hop, not just
          # the target hop.
          ansible_ssh_common_args: >-
            -o ProxyCommand="ssh -W %h:%p -q
            -o StrictHostKeyChecking=accept-new
            -o UserKnownHostsFile=~/.ssh/known_hosts
            -o ServerAliveInterval=15 -o ServerAliveCountMax=3
            -o ConnectTimeout=30 -o ConnectionAttempts=3
            root@10.10.10.1"
            -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=15
            -o ConnectTimeout=30

    # Same VM as k3s-node, reached directly over WireGuard — no ProxyJump.
    # Used only by verify-wireguard.yml, to prove an operator's WG peer
    # routes straight into vmbr1 (not just via the host), the capability
    # docs/architecture.md's management-plane section describes.
    k3s_node_wg:
      hosts:
        k3s-node-wg:
          ansible_host: 10.10.10.10
          ansible_user: debian

    runner:
      hosts:
        ci-runner:
          ansible_host: 10.10.10.20
          ansible_user: debian
          # ci-runner sits on the internal bridge (vmbr1), same as
          # k3s-node — reachable only through the Proxmox host.
          #
          # Unlike k3s_node above, this jump keeps the host's PUBLIC IP on
          # purpose. The very first runner.yml apply that provisions this VM
          # runs on ubuntu-latest (no self-hosted runner exists yet), and a
          # GitHub-hosted runner can only reach the host over the public
          # internet — the internal 10.10.10.1 is unroutable from there. That
          # apply also predates the restrict_management flip, so the host's
          # public SSH is still open to it. Do NOT "align" this with
          # k3s_node's internal-IP jump: it would brick a from-scratch lab
          # install, because runner provisioning could never reach this VM.
          #
          # See k3s_node's comment above for why this is an explicit
          # `ssh -W` ProxyCommand rather than `-o ProxyJump=`: this runner
          # apply is the first thing to ever exercise this jump from a
          # fresh CI runner (ubuntu-latest), and the shorthand's inner jump
          # ssh doesn't reliably inherit the outer ssh's -o flags on every
          # OpenSSH build.
          ansible_ssh_common_args: >-
            -o ProxyCommand="ssh -W %h:%p -q
            -o StrictHostKeyChecking=accept-new
            -o UserKnownHostsFile=~/.ssh/known_hosts
            -o ServerAliveInterval=15 -o ServerAliveCountMax=3
            -o ConnectTimeout=30 -o ConnectionAttempts=3
            root@{{ hostvars['server'].ansible_host }}"
            -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=15
            -o ConnectTimeout=30

    # Group of VMs targeted by playbooks/hardening-vms.yml. The hardening
    # role reconciles each guest's authorized_keys from config/lab.yml
    # (admin_ssh_public_keys) declaratively and exclusively, so both guests
    # are enrolled — that reconciliation is also what authorizes the
    # automation key on k3s-node, a VM built before the key existed (see
    # docs/ssh-keys.md).
    vm_guests:
      children:
        runner: {}
        k3s_node: {}
