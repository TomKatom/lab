# SOPS encryption rules for this repo.
#
# Single age keypair covers Kubernetes Secrets (via ksops), OpenTofu
# tfvars, and Ansible group/host vars. The public key below is safe to
# commit. The matching private key is held out-of-band — see
# docs/secrets.md — and is never written to this repo.
keys:
  - &admin_tom age1vp0uflxu3ggmy0szdzhk555dwxpjsv86twxz95d2xcy5wc70h3mq4jr7lc

creation_rules:
  # Kubernetes Secrets rendered through ksops. Only encrypt the payload
  # so metadata (name, namespace, labels) stays plaintext and diffable.
  - path_regex: clusters/.*\.sops\.ya?ml$
    encrypted_regex: ^(data|stringData)$
    key_groups:
      - age:
          - *admin_tom

  # OpenTofu variable files (Proxmox/Cloudflare API tokens, etc). Encrypted
  # as opaque binary (whole file), named `*.sops.tfvars.json` rather than
  # `*.sops.tfvars`: `tofu fmt -recursive` treats any `*.tfvars` file as HCL
  # source and errors trying to format ciphertext, but it explicitly skips
  # `*.tfvars.json` (a first-class, non-HCL tfvars format) — so this
  # extension is what keeps `tofu fmt`/CI green without touching the
  # ciphertext. `sops -d` doesn't care about the extension either way.
  - path_regex: infra/tofu/.*\.sops\.tfvars\.json$
    key_groups:
      - age:
          - *admin_tom

  # OpenTofu state-encryption passphrase, injected at runtime via
  # TF_ENCRYPTION (see infra/tofu/tofu.sh) — never in code.
  - path_regex: infra/tofu/state\.sops\.env$
    key_groups:
      - age:
          - *admin_tom

  # Ansible group_vars / host_vars.
  - path_regex: ansible/.*\.sops\.ya?ml$
    key_groups:
      - age:
          - *admin_tom
