name: CI

on:
  pull_request:
  push:
    branches: [master]

# On a PR, cancel the previous run when a new commit is pushed (head_ref
# groups all pushes of one PR). On a push to master, head_ref is empty and
# the fallback run_id makes each run its own group, so master runs always
# finish - only redundant in-flight PR runs get cancelled.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: pip install yamllint
      - run: yamllint .

  tofu:
    name: opentofu fmt/validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/tofu
    steps:
      - uses: actions/checkout@v7
      - id: has-tf
        run: |
          if find . -name '*.tf' -print -quit | grep -q .; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: opentofu/setup-opentofu@v2
        if: steps.has-tf.outputs.present == 'true'
      - name: tofu fmt -check
        if: steps.has-tf.outputs.present == 'true'
        run: tofu fmt -check -recursive
      # terraform.tfstate is committed (encrypted) for the local/CI-apply
      # workflow, but fmt/validate is pure static analysis and has no
      # TF_ENCRYPTION passphrase (this job intentionally holds no secrets).
      # Strip the state out of this ephemeral checkout so the default local
      # backend has nothing encrypted to fail on reading.
      - name: remove committed state (fmt/validate needs none)
        if: steps.has-tf.outputs.present == 'true'
        run: rm -f terraform.tfstate terraform.tfstate.backup
      - name: tofu init (no backend)
        if: steps.has-tf.outputs.present == 'true'
        run: tofu init -backend=false
      - name: tofu validate
        if: steps.has-tf.outputs.present == 'true'
        run: tofu validate
      - name: no .tf files yet
        if: steps.has-tf.outputs.present == 'false'
        run: echo "infra/tofu has no .tf files yet, skipping"

  ansible-lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: has-ansible
        run: |
          if find ansible -name '*.yml' -print -quit | grep -q .; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Ansible collections
        if: steps.has-ansible.outputs.present == 'true'
        # ansible-lint@v26.6.0's own "install deps from requirements_file"
        # step runs a plain `ansible-galaxy install`, which treats *any*
        # already-present version of a collection as satisfying the
        # requirement and silently skips installing our pin — and
        # ubuntu-latest ships a pre-baked ansible.posix/community.general
        # snapshot that isn't resolvable the way ansible-lint expects. That
        # false "already installed" caused #32's CI to fail on unrelated,
        # pre-existing files (couldn't resolve ansible.posix.sysctl etc.)
        # even though nothing about those files or their collections had
        # changed. --force makes the install unconditional so it always
        # matches ansible/requirements.yml's pins.
        run: ansible-galaxy collection install -r ansible/requirements.yml --force
      - uses: ansible/ansible-lint@v26.6.0
        if: steps.has-ansible.outputs.present == 'true'
        env:
          # ansible.cfg lives in ansible/, but this action (like pre-commit's
          # ansible-lint hook) runs from the repo root, where ansible-core's
          # default ansible.cfg discovery (cwd only, no parent-dir walk)
          # never finds it — silently falling back to the wrong roles_path
          # and breaking role resolution for every role-using playbook.
          ANSIBLE_CONFIG: ansible/ansible.cfg
        with:
          # v26.6.0 has no `path` input (only `args`) — a `path:` key here
          # was always silently ignored (with a GH warning), so this has
          # actually been linting the whole repo (minus .ansible-lint's
          # exclude_paths) by accident the entire time. Pass the intended
          # scope explicitly instead.
          args: "ansible/"
      - name: no ansible files yet
        if: steps.has-ansible.outputs.present == 'false'
        run: echo "ansible/ has no playbooks yet, skipping"

  render-manifests:
    name: helm/kustomize render -> kubeconform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: azure/setup-helm@v5
      - name: install kustomize + kubeconform
        env:
          KUSTOMIZE_VERSION: "5.8.1"
          KUBECONFORM_VERSION: "0.8.0"
        run: |
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" | tar xz
          curl -sL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | tar xz kubeconform
          sudo mv kustomize kubeconform /usr/local/bin/
      # yq (mikefarah/yq, the Go binary, not the Python wrapper) parses the
      # platform Application manifests below. Its release "checksums" file
      # is impractically large and 504s on plain curl (a known upstream
      # issue), so - like kustomize/kubeconform above - this pins an exact,
      # immutable GitHub Releases URL rather than verifying a checksum.
      - name: install yq
        env:
          YQ_VERSION: "4.53.3"
        run: |
          curl -sL "https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/yq_linux_amd64" -o yq
          chmod +x yq
          sudo mv yq /usr/local/bin/
      - name: helm template charts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          charts=(clusters/lab/apps/*/ clusters/lab/platform/*/)
          found=false
          for c in "${charts[@]}"; do
            [ -f "${c}Chart.yaml" ] || continue
            found=true
            echo "== helm template ${c} =="
            helm template "$c" | kubeconform -strict -ignore-missing-schemas -summary
          done
          $found || echo "no Helm charts yet, skipping"
      # Starting Phase 5 PR2, each clusters/lab/platform/<component>.yaml is
      # a single-source Application referencing a remote Helm chart with
      # inline helm.valuesObject (repoURL/chart/targetRevision + values,
      # not a local Chart.yaml dir) - the "helm template charts" step above
      # only renders local charts and silently skips these. This step
      # renders them the same way Argo would: `helm template --repo`, no
      # `helm repo add` bookkeeping needed.
      - name: helm template remote-chart platform Applications
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          found=false
          for app in clusters/lab/platform/*.yaml; do
            [ -f "$app" ] || continue
            kind=$(yq eval '.kind // ""' "$app")
            [ "$kind" = "Application" ] || continue
            chart=$(yq eval '.spec.source.chart // ""' "$app")
            [ -n "$chart" ] || continue
            found=true

            name=$(yq eval '.metadata.name' "$app")
            repoURL=$(yq eval '.spec.source.repoURL' "$app")
            targetRevision=$(yq eval '.spec.source.targetRevision' "$app")
            namespace=$(yq eval '.spec.destination.namespace' "$app")
            releaseName=$(yq eval '.spec.source.helm.releaseName // .metadata.name' "$app")

            valuesFile=$(mktemp)
            yq eval '.spec.source.helm.valuesObject // {}' "$app" >"$valuesFile"

            echo "== helm template ${app} (name=${name} chart=${chart} version=${targetRevision}) =="
            helm template "$releaseName" "$chart" --repo "$repoURL" --version "$targetRevision" \
              --namespace "$namespace" -f "$valuesFile" | kubeconform -strict -ignore-missing-schemas -summary
            rm -f "$valuesFile"
          done
          $found || echo "no remote-chart platform Applications yet, skipping"
      # ksops SecretGenerator overlays (kind: ksops, apiVersion: viaduct.ai/v1)
      # decrypt a *.sops.yaml Secret - `kustomize build` can't decrypt them in
      # this GitHub-hosted, keyless job (no SOPS_AGE_KEY here; the age key
      # only ever reaches the self-hosted runner already used by
      # tofu-apply.yml/ansible-apply.yml). They render only in-cluster via
      # the ksops-patched Argo repo-server (Phase 4). A ksops-generated
      # v1/Secret is structurally valid by construction, so there's nothing
      # meaningful for kubeconform to check here anyway - skip, don't build.
      - name: kustomize build secret overlays
        shell: bash
        run: |
          set -euo pipefail
          found=false
          while IFS= read -r -d '' k; do
            dir=$(dirname "$k")
            if grep -rq 'kind: *ksops' "$dir" 2>/dev/null; then
              echo "== skipping ${dir} (ksops SecretGenerator - decrypts only in-cluster via the ksops-patched Argo repo-server; a ksops-generated Secret is structurally valid by construction, nothing for kubeconform to check here) =="
              continue
            fi
            found=true
            echo "== kustomize build ${dir} =="
            kustomize build "$dir" | kubeconform -strict -ignore-missing-schemas -summary
          done < <(find clusters -name kustomization.yaml -print0)
          $found || echo "no non-ksops Kustomize overlays yet, skipping"
