name: OpenTofu Apply

# Two-job split so a bad diff can never apply unattended:
#   plan  - runs automatically on every pull request targeting master
#           (read-only), saves the exact plan as an artifact.
#   apply - needs: plan, and runs in the `production` GitHub Environment.
#           That environment's required-reviewer rule is what pauses this
#           job until a human clicks Approve in the Actions UI, having
#           reviewed the exact plan output posted by the `plan` job. `apply`
#           downloads and applies that same saved plan file (not a freshly
#           recomputed one), so the plan a human approved is the plan that
#           runs. There is no other gate in this file, and there must never
#           be one: no repo variable, no workflow_dispatch bypass, no
#           auto-approve of the environment. Until the `production`
#           environment exists (with its secrets and a reviewer configured -
#           a one-time manual setup step, see docs/runbooks/tofu-apply.md)
#           the `apply` job simply has nowhere to run: inert by construction.
#
# Applying pre-merge (against the PR's own branch) rather than post-merge
# means the updated state can be pushed as an extra commit onto that same
# branch, so it rides along in the PR's own squash-merge instead of landing
# as a separate bot commit/PR afterwards. Master itself is never pushed to
# by this workflow, so none of this needs a branch-protection exception.
#
# Both jobs get their secrets by running infra/tofu/tofu.sh - the same
# wrapper a local apply uses - which decrypts state.sops.env (the
# state-encryption passphrase) and secrets.sops.tfvars.json (the Proxmox and
# Cloudflare API tokens) in memory with the age key, supplied here as the
# SOPS_AGE_KEY repository secret. There is deliberately no parallel set of
# per-token Actions secrets to hand-sync any more: the committed ciphertext
# is the single source of truth, and CI and a laptop take the identical code
# path. What that concentrates into one key, and why it was accepted, is
# spelled out in docs/secrets.md - read it before narrowing or widening this.

on:
  pull_request:
    branches: [master]

# Supersede, don't stack. Every push to a PR fires a fresh run of this
# workflow. Without this block the previous run's `apply` job sits in the
# `production` environment's `waiting` (pending-approval) state while still
# holding the global `tofu-apply` concurrency group below; the new push's
# `apply` then queues behind it forever (that group is cancel-in-progress:
# false), and since nobody should ever approve the stale run's plan, the two
# deadlock until a human cancels one by hand. Keying this group per-PR with
# cancel-in-progress: true means a new push cancels the whole prior run for
# that PR - including its waiting apply - so only the latest commit's plan is
# ever live to approve. Trade-off: a push landing during an already-approved,
# actively-running apply cancels it mid-flight; that is safe here because the
# updated state is only committed/pushed on a fully successful apply (see the
# final job step), so the source-of-truth state in git is never left partial -
# the next run re-plans from the last good state and reconciles any drift.
concurrency:
  group: tofu-apply-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

# The runner brings no toolchain of its own (ansible/roles/github_runner
# installs none - each workflow self-installs what it needs per run), so both
# jobs below install sops via ./.github/actions/install-sops. Pinned and
# checksum-verified because this one binary is what unlocks every encrypted
# file in the repo: an unverified download here would sit inside the trust
# root itself. See that composite action for the pin itself and how
# Renovate tracks it.

jobs:
  plan:
    name: tofu plan
    # LAB_RUNNER (not a Tofu-specific name): ansible-apply.yml will share
    # this same self-hosted runner once one exists for the
    # WireGuard-only-management phase, so a Tofu-specific variable name
    # would be misleading now that Ansible needs one too.
    runs-on: ${{ vars.LAB_RUNNER || 'ubuntu-latest' }}
    defaults:
      run:
        working-directory: infra/tofu
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROXMOX_SSH_PRIVATE_KEY }}

      # tofu_wrapper: false is load-bearing, not tidiness. The wrapper (whose
      # only purpose is exposing tofu's stdout/stderr/exit code as step
      # outputs, which nothing here consumes) replaces `tofu` with a Node
      # script that re-spawns the real binary as a child. tofu.sh passes the
      # decrypted tfvars as `-var-file=<(sops -d ...)`, i.e. a /dev/fd/NN
      # path, and that file descriptor is not inherited across the extra
      # spawn - so with the wrapper on, every plan/apply fails to read its
      # variables.
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_wrapper: false

      - name: Install sops
        uses: ./.github/actions/install-sops

      # SOPS_AGE_KEY is scoped to the steps that actually run tofu.sh rather
      # than set job-wide, so the one key that unlocks every encrypted file in
      # this repo never sits in the environment of a third-party action step -
      # same reasoning as ansible-apply.yml's GH_RUNNER_PAT. The guard below
      # turns "the operator never set the secret" into one obvious line
      # instead of a sops "no identity matched any of the recipients" trace.
      - name: tofu init
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          : "${SOPS_AGE_KEY:?not set - add the repository secret, see docs/runbooks/tofu-apply.md}"
          ./tofu.sh init -input=false

      - name: tofu plan
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          set -o pipefail
          ./tofu.sh plan -input=false -no-color -out=tofu.tfplan | tee /tmp/tofu-plan.out

      - name: Post plan to job summary
        if: always()
        run: |
          {
            echo "## tofu plan"
            echo
            echo '```'
            if [ -f /tmp/tofu-plan.out ]; then
              cat /tmp/tofu-plan.out
            else
              echo "(plan did not run - an earlier step failed)"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: tofu-plan
          path: infra/tofu/tofu.tfplan
          retention-days: 1

  # Machine-checks the flip runbook's CI preconditions
  # (docs/runbooks/restrict-management-flip.md §1 rows 1-3): a PR that turns
  # restrict_management false->true must not be appliable while CI still
  # runs on a public-IP hosted runner — the apply would sever its own
  # connection to 22/8006 mid-flight and half-apply. Cheap and read-only; a
  # no-op for every PR that doesn't flip the flag. This deliberately checks
  # only what GitHub can see (LAB_RUNNER set, that runner online): the
  # human parts of the runbook — WireGuard verified end-to-end, the
  # dead-man switch armed, pve-firewall daemon confirmed running — cannot
  # be machine-checked from here and remain the operator's responsibility
  # before approving.
  flip-guard:
    name: restrict_management flip guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          # Full history so the base branch's version of terraform.tfvars is
          # diffable below.
          fetch-depth: 0

      - name: Block a false->true flip unless CI is routed onto an online internal runner
        env:
          LAB_RUNNER: ${{ vars.LAB_RUNNER }}
          # GH_RUNNER_PAT (repo Administration) is the one token this repo
          # has that can list self-hosted runners; the default GITHUB_TOKEN
          # cannot. Only consulted when the PR actually flips the flag, so
          # an expired PAT can never block ordinary PRs.
          GH_TOKEN: ${{ secrets.GH_RUNNER_PAT }}
          BASE_REF: ${{ github.base_ref }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          read_flag() {
            # Missing file/line counts as false: the guard only cares about
            # a false->true transition.
            { cat -; } | grep -E '^restrict_management' | grep -m1 -oE 'true|false' || echo false
          }
          base=$(git show "origin/${BASE_REF}:infra/tofu/terraform.tfvars" 2> /dev/null | read_flag)
          head=$(read_flag < infra/tofu/terraform.tfvars)
          if [ "$head" != "true" ] || [ "$base" = "true" ]; then
            echo "No false->true restrict_management flip (base=${base}, head=${head}) - nothing to guard."
            exit 0
          fi
          echo "This PR flips restrict_management false->true - checking CI can survive the apply."
          if [ -z "${LAB_RUNNER}" ]; then
            echo "::error::restrict_management flip blocked: the LAB_RUNNER repo variable is unset, so the apply would run on a public-IP hosted runner and cut itself off mid-flight. Register the self-hosted runner and set LAB_RUNNER first (docs/runbooks/restrict-management-flip.md §2)." >&2
            exit 1
          fi
          online=$(gh api "repos/${REPO}/actions/runners" \
            --jq "[.runners[] | select(.status == \"online\") | select(.labels[].name == \"${LAB_RUNNER}\")] | length")
          if [ "${online}" -lt 1 ]; then
            echo "::error::restrict_management flip blocked: no ONLINE self-hosted runner carries the '${LAB_RUNNER}' label. The apply routed to it would queue forever (or run nowhere safe). Fix the runner before approving (docs/runbooks/restrict-management-flip.md §1 rows 1-3)." >&2
            exit 1
          fi
          echo "OK: LAB_RUNNER='${LAB_RUNNER}' with ${online} online runner(s) - the flip apply will run inside the management network."

  apply:
    name: tofu apply
    needs: [plan, flip-guard]
    environment: production
    # See the `plan` job's runs-on comment: shared with ansible-apply.yml.
    runs-on: ${{ vars.LAB_RUNNER || 'ubuntu-latest' }}
    concurrency:
      group: tofu-apply
      cancel-in-progress: false
    permissions:
      contents: write
    defaults:
      run:
        working-directory: infra/tofu
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: tofu-plan
          path: infra/tofu

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROXMOX_SSH_PRIVATE_KEY }}

      # See the `plan` job's identical step for why the wrapper is disabled.
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_wrapper: false

      # See the `plan` job's identical step.
      - name: Install sops
        uses: ./.github/actions/install-sops

      # tofu.sh still decrypts state.sops.env here: TF_ENCRYPTION's `plan`
      # block means the saved plan file downloaded above is itself an
      # encrypted envelope, unreadable without the same passphrase the state
      # needs. See the `plan` job for why SOPS_AGE_KEY is scoped per-step.
      - name: tofu init
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          : "${SOPS_AGE_KEY:?not set - add the repository secret, see docs/runbooks/tofu-apply.md}"
          ./tofu.sh init -input=false

      # Applies the exact plan file the `plan` job produced and a human
      # approved above - not a freshly recomputed plan. This step is safe
      # unattended ONLY because this job runs behind the `production`
      # environment's required-reviewer gate: a human already approved this
      # specific plan file before this step ever runs.
      #
      # tofu.sh deliberately omits its -var-file for this form: a saved plan
      # replays the variable values baked into it, and OpenTofu aborts if
      # values passed alongside disagree with them.
      - name: tofu apply
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: ./tofu.sh apply -input=false tofu.tfplan

      # State changed -> push it as an extra commit onto this PR's own
      # branch (never onto master - master is never touched by this
      # workflow, so branch protection there is irrelevant here). When the
      # PR is squash-merged, this commit and the human's commits land on
      # master as one commit: no separate bot commit or bot PR ever shows
      # up in master's history.
      #
      # Deliberately no [skip ci] here: GitHub's skip-ci is a repo-wide
      # substring match on the commit message, not scoped to this workflow -
      # it would also skip ci.yml's required checks on this exact commit,
      # leaving the PR permanently unmergeable (branch protection waits
      # forever for status that will never post). The re-trigger this commit
      # causes is self-limiting instead: the next `plan` sees state that
      # already matches what was just applied, so `apply` re-runs as a
      # zero-diff no-op (one extra required-reviewer click), and this same
      # step's git-diff guard above means it pushes nothing further.
      - name: Push updated state to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add terraform.tfstate
          if git diff --cached --quiet; then
            echo "terraform.tfstate unchanged, nothing to commit"
            exit 0
          fi
          git commit -m "chore(tofu): update terraform.tfstate"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
